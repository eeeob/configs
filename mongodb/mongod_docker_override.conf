# يربط mongod.service بـ docker.service حتى لا يفشل mongod عند الإقلاع
# قبل أن ينشئ dockerd واجهة docker0 بالعنوان 172.17.0.1 (exit code 48)
[Unit]
After=docker.service
Requires=docker.service

[Service]
ExecStartPre=/bin/sh -c 'for i in $(seq 1 30); do ip -4 addr show docker0 2>/dev/null | grep -q 172.17.0.1 && exit 0; sleep 1; done; echo "docker0 172.17.0.1 not found after 30s" >&2; exit 1'
